name: Code Review Agent

on:
  push:
    branches: ['**']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip commits that were themselves created by this workflow to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install @google/genai
        run: npm install --no-save @google/genai

      - name: Generate diff
        id: diff
        run: |
          # For the very first commit there is no parent; fall back to an empty diff
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff HEAD~1 HEAD > /tmp/commit.diff
          else
            git show HEAD > /tmp/commit.diff
          fi
          echo "diff_file=/tmp/commit.diff" >> "$GITHUB_OUTPUT"

      - name: Run code review agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          node scripts/review-agent.mjs < /tmp/commit.diff

      - name: Commit updated CODEBASE_LOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CODEBASE_LOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: update CODEBASE_LOG.md for ${{ github.sha }} [skip ci]"
            git push
          fi
