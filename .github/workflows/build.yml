name: Build and Release Desktop App

env:
  RUNNER_DEBUG: 1

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js 18
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        cache: ''

    - name: Diagnose environment
      run: |
        echo "=== System Info ==="
        uname -a
        echo "=== Node ==="
        which node && node --version
        echo "=== NPM ==="
        which npm && npm --version
        echo "=== Disk ==="
        df -h /

    - name: Configure npm
      run: |
        npm config set legacy-peer-deps true
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000

    - name: Clean install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install

    - name: Build web app
      run: npm run build

    - name: Build DMG (macOS)
      run: npm run build-electron-mac
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
        DEBUG: electron-builder

    - name: Check build artifacts
      if: always()
      run: |
        echo "=== Build Artifacts ==="
        ls -lah dist-electron/ || echo "dist-electron directory not found"
        echo "=== Dist Contents ==="
        ls -lah dist/ || echo "dist directory not found"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v5
      with:
        name: macos-build
        path: dist-electron/
        if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js 18
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        cache: ''

    - name: Diagnose environment
      run: |
        echo "=== System Info ==="
        systeminfo | findstr /B "OS Configuration"
        echo "=== Node ==="
        where node
        node --version
        echo "=== NPM ==="
        where npm
        npm --version

    - name: Configure npm
      run: |
        npm config set legacy-peer-deps true
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000

    - name: Clean install dependencies
      shell: pwsh
      run: |
        if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
        if (Test-Path package-lock.json) { Remove-Item package-lock.json }
        npm cache clean --force
        npm install

    - name: Build web app
      run: npm run build

    - name: Build EXE (Windows)
      run: npm run build-electron-win

    - name: Check build artifacts
      if: always()
      run: |
        echo "=== Build Artifacts ==="
        dir dist-electron\ || echo "dist-electron directory not found"
        echo "=== Dist Contents ==="
        dir dist\ || echo "dist directory not found"

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v5
      with:
        name: windows-build
        path: dist-electron/
        if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js 18
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        cache: ''

    - name: Diagnose environment
      run: |
        echo "=== System Info ==="
        uname -a
        echo "=== Node ==="
        which node && node --version
        echo "=== NPM ==="
        which npm && npm --version
        echo "=== Disk ==="
        df -h /
        echo "=== CPU ==="
        nproc

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev

    - name: Configure npm
      run: |
        npm config set legacy-peer-deps true
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000

    - name: Clean install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install

    - name: Build web app
      run: npm run build

    - name: Build DEB and AppImage (Linux)
      run: npm run build-electron-linux

    - name: Check build artifacts
      if: always()
      run: |
        echo "=== Build Artifacts ==="
        ls -lah dist-electron/ || echo "dist-electron directory not found"
        echo "=== Dist Contents ==="
        ls -lah dist/ || echo "dist directory not found"

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v5
      with:
        name: linux-build
        path: dist-electron/
        if-no-files-found: warn

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: build-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build-artifacts/**/*
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        body: |
          ## Cross-Platform Build Artifacts

          This release includes builds for:
          - **macOS**: DMG installer and ZIP archive
          - **Windows**: EXE installer and portable executable
          - **Linux**: DEB package and AppImage

          See [BUILD.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/BUILD.md) for installation instructions.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}