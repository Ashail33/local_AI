name: Build and Release Desktop App

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all JavaScript actions to avoid Node 20 deprecation warnings.
  # actions/upload-artifact@v5 and actions/download-artifact@v5 currently run on Node 20;
  # this flag makes them run on Node 24 instead.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        rm -rf node_modules
        npm ci --include=optional
        echo "=== Verify oxide binding ==="
        ls node_modules/@tailwindcss/oxide-darwin-* || echo "WARNING: no darwin oxide binding found"

    - name: Build web app
      run: npm run build

    - name: Compile Electron main process
      run: npm run build-electron-src

    - name: Build DMG (macOS)
      run: npx electron-builder --mac dmg zip --publish never
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Upload macOS artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v5
      with:
        name: macos-build
        retention-days: 1
        path: |
          dist-electron/*.dmg
          dist-electron/*.zip
        if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        npm ci --include=optional
        echo "=== Verify oxide binding ==="
        Get-ChildItem node_modules/@tailwindcss/oxide-win32-* -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Build web app
      run: npm run build

    - name: Compile Electron main process
      run: npm run build-electron-src

    - name: Build EXE (Windows)
      run: npx electron-builder --win nsis --publish never

    - name: Upload Windows artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v5
      with:
        name: windows-build
        retention-days: 1
        path: |
          dist-electron/*.exe
        if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        rm -rf node_modules
        npm ci --include=optional
        echo "=== Verify oxide binding ==="
        ls node_modules/@tailwindcss/oxide-linux-* || echo "WARNING: no linux oxide binding found"

    - name: Build web app
      run: npm run build

    - name: Compile Electron main process
      run: npm run build-electron-src

    - name: Build Linux packages
      run: npx electron-builder --linux deb AppImage --publish never

    - name: Upload Linux artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v5
      with:
        name: linux-build
        retention-days: 1
        path: |
          dist-electron/*.deb
          dist-electron/*.AppImage
        if-no-files-found: warn

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: build-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: build-artifacts/**/*
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        generate_release_notes: true
